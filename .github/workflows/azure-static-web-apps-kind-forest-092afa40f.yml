name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# Deploys via the Azure Static Web Apps CLI (`swa deploy`) instead of the
# Azure/static-web-apps-deploy@v1 container action. The container action builds
# itself from `mcr.microsoft.com/appsvc/staticappsclient:stable` on every run;
# when Microsoft's registry throttles/refuses anonymous pulls the action fails
# before the app is even built. The CLI downloads the StaticSitesClient binary
# directly, avoiding that Docker pull entirely.

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_FOREST_092AFA40F }}
        run: |
          npx -y @azure/static-web-apps-cli deploy ./dist \
            --env "${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'production' }}" \
            --verbose
