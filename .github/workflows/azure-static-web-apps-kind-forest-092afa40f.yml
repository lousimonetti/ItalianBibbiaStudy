name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# Deploys via the Azure Static Web Apps CLI (`swa deploy`) instead of the
# Azure/static-web-apps-deploy@v1 container action. The container action builds
# itself from `mcr.microsoft.com/appsvc/staticappsclient:stable` on every run;
# when Microsoft's registry throttles/refuses anonymous pulls the action fails
# before the app is even built. The CLI downloads the StaticSitesClient binary
# directly, avoiding that Docker pull entirely.
#
# Pull requests build only (validation). Deployment to production happens only on
# push to main. We intentionally do NOT create per-PR preview environments: the
# free tier caps staging environments (3), and the CLI has no teardown command,
# so per-PR previews fill the quota and block deploys with "maximum number of
# staging environments".

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_FOREST_092AFA40F }}
        run: |
          npx -y @azure/static-web-apps-cli deploy ./dist \
            --env production \
            --verbose
