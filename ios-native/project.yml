# XcodeGen spec — generates ItalianBibbiaStudy.xcodeproj so the .xcodeproj
# never needs to be committed or hand-maintained.
#
#   brew install xcodegen
#   cd ios-native && xcodegen generate
#   open ItalianBibbiaStudy.xcodeproj
#
# Before shipping, change PRODUCT_BUNDLE_IDENTIFIER to your own reverse-DNS
# id (see DEPLOYMENT.md step 2) — App Store bundle ids must be unique.

name: ItalianBibbiaStudy

options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  BibbiaCore:
    path: BibbiaCore

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

targets:
  ItalianBibbiaStudy:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: BibbiaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.italianbibbiastudy   # ← change me
        TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Italian Bible Study
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: >-
          The microphone lets you practice pronouncing Italian words and
          sentences; audio is processed on-device and never uploaded.
        NSSpeechRecognitionUsageDescription: >-
          Speech recognition scores your Italian pronunciation. Recognition
          runs through Apple's speech service; no recordings are stored.
        ITSAppUsesNonExemptEncryption: false
